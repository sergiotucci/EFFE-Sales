<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0f" />
<title>EFFE Ring</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<style>
:root{--bg:#f4f4f7;--card:#fff;--text:#111;--muted:#777;--line:#e8e8ee;--accent:#111;--good:#1f9d55;--warn:#d97706;--bad:#dc2626;--shadow:0 12px 35px rgba(0,0,0,.08);--radius:24px} 
@media(prefers-color-scheme:dark){:root{--bg:#07080b;--card:#13151c;--text:#f6f6f8;--muted:#a1a1aa;--line:#262936;--accent:#fff;--shadow:none}}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top) 14px calc(90px + env(safe-area-inset-bottom));} 
.app{max-width:520px;margin:0 auto}.top{position:sticky;top:0;z-index:5;background:linear-gradient(var(--bg) 75%,transparent);padding:18px 0 14px}.brand{display:flex;justify-content:space-between;align-items:center}.brand h1{font-size:32px;line-height:1;margin:0;font-weight:800;letter-spacing:-1px}.pill{font-size:13px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--card)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:10px 0 16px}.stat{background:var(--card);border-radius:22px;padding:16px;box-shadow:var(--shadow);border:1px solid var(--line)}.stat b{display:block;font-size:28px}.stat span{font-size:13px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin:14px 0;box-shadow:var(--shadow)}.section-title{font-size:22px;font-weight:800;letter-spacing:-.4px;margin:0 0 14px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:9;background:rgba(245,245,247,.82);backdrop-filter:blur(18px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:flex;gap:8px;justify-content:center}@media(prefers-color-scheme:dark){.tabs{background:rgba(7,8,11,.82)}}.tab{border:0;background:transparent;color:var(--muted);border-radius:18px;padding:10px 12px;font-weight:700;min-width:75px}.tab.active{background:var(--accent);color:var(--bg)}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px} input,select{width:100%;font-size:18px;border:1px solid var(--line);background:var(--bg);color:var(--text);border-radius:16px;padding:15px;outline:none}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{width:100%;border:0;border-radius:18px;padding:16px 18px;font-size:17px;font-weight:800;margin-top:14px;background:var(--accent);color:var(--bg)}.btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--line)}.btn.danger{background:#dc2626;color:#fff}.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:18px;padding:4px;gap:4px}.seg button{flex:1;border:0;background:transparent;color:var(--text);padding:12px;border-radius:14px;font-weight:800}.seg button.on{background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.stock-card{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--line)}.stock-card:last-child{border-bottom:0}.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px;border:1px solid var(--line)}.black{background:#111}.silver{background:#c7c7cc}.gold{background:#d6a842}.qty{font-size:22px;font-weight:800}.muted{color:var(--muted)}.alert{padding:12px;border-radius:16px;background:rgba(217,119,6,.12);color:var(--warn);margin:8px 0;font-weight:700}.order{border-bottom:1px solid var(--line);padding:12px 0}.order:last-child{border-bottom:0}.order b{font-size:17px}.badge{float:right;padding:5px 9px;border-radius:999px;background:var(--bg);font-size:12px;color:var(--muted)}.hidden{display:none}.mini{font-size:12px;color:var(--muted);line-height:1.35}.toolbar{display:flex;gap:10px}.toolbar .btn{font-size:15px;padding:13px}.toast{position:fixed;left:18px;right:18px;bottom:95px;background:var(--accent);color:var(--bg);padding:15px;border-radius:18px;text-align:center;font-weight:800;z-index:20;opacity:0;transform:translateY(20px);transition:.25s}.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body><div class="app">
<header class="top"><div class="brand"><h1>EFFE Ring</h1><span class="pill">Mobile PWA</span></div><div class="grid"><div class="stat"><b id="sStock">0</b><span>Disponibili</span></div><div class="stat"><b id="sValue">€0</b><span>Valore stock</span></div><div class="stat"><b id="sSold">0</b><span>Venduti</span></div><div class="stat"><b id="sMonth">€0</b><span>Incassato</span></div></div></header>
<section id="viewOrdine" class="view"><div class="card"><h2 class="section-title">Nuovo ordine</h2><label>Cliente</label><input id="customer" placeholder="Nome cliente" autocomplete="name"><div class="row"><div><label>Taglia</label><select id="size"></select></div><div><label>Colore</label><select id="color"><option>Nero</option><option>Argento</option><option>Oro</option></select></div></div><div class="row"><div><label>Quantità</label><input id="qty" type="number" min="1" value="1"></div><div><label>Prezzo unitario</label><input id="price" type="number" min="0" value="79"></div></div><label>Stato</label><select id="status"><option>Pagato</option><option>Da pagare</option><option>Da spedire</option><option>Consegnato</option></select><p class="muted" id="availability">Disponibilità: -</p><button class="btn" onclick="saveOrder()">Crea ordine</button></div></section>
<section id="viewMagazzino" class="view hidden"><div class="card"><h2 class="section-title">Magazzino</h2><div class="seg"><button class="on" onclick="setStockFilter('Nero',this)">Nero</button><button onclick="setStockFilter('Argento',this)">Argento</button><button onclick="setStockFilter('Oro',this)">Oro</button></div><div id="stockList"></div></div><div class="card"><h2 class="section-title">Riordino</h2><div id="alerts"></div></div></section>
<section id="viewOrdini" class="view hidden"><div class="card"><h2 class="section-title">Ultimi ordini</h2><div id="ordersList"></div></div><div class="card"><h2 class="section-title">Esporta</h2><div class="toolbar"><button class="btn secondary" onclick="exportCSV()">CSV</button><button class="btn secondary" onclick="shareBackup()">Backup</button></div><p class="mini">Il CSV si apre con Excel o Numbers. Il backup salva tutti i dati in JSON.</p></div></section>
<section id="viewImpostazioni" class="view hidden"><div class="card"><h2 class="section-title">Carico magazzino</h2><div class="row"><div><label>Taglia</label><select id="loadSize"></select></div><div><label>Colore</label><select id="loadColor"><option>Nero</option><option>Argento</option><option>Oro</option></select></div></div><label>Quantità da aggiungere</label><input id="loadQty" type="number" min="1" value="1"><button class="btn" onclick="loadStock()">Aggiungi stock</button></div><div class="card"><h2 class="section-title">Dati</h2><button class="btn secondary" onclick="importBackupPrompt()">Importa backup</button><button class="btn danger" onclick="resetData()">Reset dati</button></div></section>
</div><nav class="tabs"><button class="tab active" onclick="showView('Ordine',this)">Ordine</button><button class="tab" onclick="showView('Magazzino',this)">Stock</button><button class="tab" onclick="showView('Ordini',this)">Ordini</button><button class="tab" onclick="showView('Impostazioni',this)">Altro</button></nav><div id="toast" class="toast"></div>
<script src="app.js"></script></body></html>
